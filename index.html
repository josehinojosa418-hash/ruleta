<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crazzy Roulette</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #f0c040;
      --gold-light: #ffe066;
      --gold-dark: #a07800;
      --bg: #0a1f0a;
      --bg2: #0f2b0f;
      --bg3: #163516;
      --border: rgba(240,192,64,0.25);
      --text: #e8f5e8;
      --text-muted: #5a8a5a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* HEADER */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo { text-align: center; line-height: 1; }
    .logo-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(212,175,55,0.4);
    }
    .logo-sub {
      font-size: 0.6rem;
      color: var(--text-muted);
      letter-spacing: 5px;
      margin-top: 3px;
      display: block;
    }

    /* LAYOUT */
    .page {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: calc(100vh - 60px);
      padding: 20px;
    }

    /* CENTER */
    #center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    #spinCount {
      font-size: 0.68rem;
      letter-spacing: 3px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    #result {
      margin-top: 18px;
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--gold);
      min-height: 58px;
      text-align: center;
      text-shadow: 0 0 30px rgba(212,175,55,0.4);
    }
    #result .label {
      display: block;
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 4px;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-weight: 400;
    }
    #spinBtn {
      margin-top: 22px;
      padding: 14px 60px;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      color: var(--bg);
      border: none;
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 4px;
      text-transform: uppercase;
      box-shadow: 0 4px 30px rgba(212,175,55,0.25);
      transition: transform 0.1s, box-shadow 0.2s, opacity 0.2s;
    }
    #spinBtn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 40px rgba(212,175,55,0.45);
    }
    #spinBtn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    /* HISTORY PANEL */
    #historyPanel {
      position: absolute;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      width: 160px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-height: 520px;
    }
    .panel-title {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--text-muted);
      text-transform: uppercase;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      width: 100%;
      text-align: center;
      margin-bottom: 10px;
    }
    #historyList {
      list-style: none;
      overflow-y: auto;
      width: 100%;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: var(--gold-dark) transparent;
    }
    #historyList::-webkit-scrollbar { width: 3px; }
    #historyList::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 2px; }
    #historyList li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: 5px;
      margin-bottom: 3px;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
    }
    #historyList li:first-child {
      background: rgba(212,175,55,0.12);
      color: var(--gold);
      font-size: 0.98rem;
    }
    #historyList li .spin-lbl {
      font-size: 0.6rem;
      color: var(--text-muted);
    }

    /* CONFETTI */
    #confettiCanvas {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 50;
    }
  </style>
</head>
<body>

<canvas id="confettiCanvas"></canvas>

<header>
  <div class="logo">
    <span class="logo-title">Crazzy Roulette</span>
    <span class="logo-sub">1 — 1420</span>
  </div>
</header>

<div class="page">
  <div id="center">
    <div id="spinCount">Giro #0</div>
    <canvas id="wheelCanvas"></canvas>
    <div id="result"><span class="label">RESULTADO</span>—</div>
    <button id="spinBtn" onclick="startSpin()">GIRAR</button>
  </div>

  <div id="historyPanel">
    <div class="panel-title">Historial</div>
    <ul id="historyList"></ul>
  </div>
</div>

<script>
const TOTAL = 1420;
const FRICTION = 0.987;
const FIXED_SPINS = { 13: 1334, 14: 1234, 15: 17 };

const SIZE = Math.min(window.innerWidth * 0.65, window.innerHeight * 0.70, 560);
const cx = SIZE / 2, cy = SIZE / 2;
const R = SIZE / 2 - 10;

const wCanvas = document.getElementById('wheelCanvas');
wCanvas.width = wCanvas.height = SIZE;
const wCtx = wCanvas.getContext('2d');

const cCanvas = document.getElementById('confettiCanvas');
cCanvas.width = window.innerWidth;
cCanvas.height = window.innerHeight;
const cCtx = cCanvas.getContext('2d');

const COLORS = [
  '#922b21','#c0392b','#9a3805','#d35400',
  '#b7770d','#d4ac0d','#1a7a3f','#27ae60',
  '#154360','#1a5276','#512e8d','#6c3483'
];

// Build wheel
const offCanvas = document.createElement('canvas');
offCanvas.width = offCanvas.height = SIZE;
const oCtx = offCanvas.getContext('2d');

(function buildWheel() {
  const N = TOTAL;
  const sec = (2 * Math.PI) / N;
  for (let i = 0; i < N; i++) {
    oCtx.beginPath();
    oCtx.moveTo(cx, cy);
    oCtx.arc(cx, cy, R - 8, i * sec, i * sec + sec + 0.003);
    oCtx.closePath();
    oCtx.fillStyle = COLORS[i % COLORS.length];
    oCtx.fill();
  }
  const step = Math.floor(N / 10);
  for (let i = 0; i < N; i += step) {
    const a = i * sec;
    oCtx.beginPath();
    oCtx.moveTo(cx+(R-28)*Math.cos(a), cy+(R-28)*Math.sin(a));
    oCtx.lineTo(cx+(R-8)*Math.cos(a),  cy+(R-8)*Math.sin(a));
    oCtx.strokeStyle = 'rgba(255,255,255,0.5)';
    oCtx.lineWidth = 1.5; oCtx.stroke();
  }
  oCtx.beginPath(); oCtx.arc(cx,cy,R,0,2*Math.PI);
  oCtx.strokeStyle='#d4af37'; oCtx.lineWidth=10; oCtx.stroke();
  for (let i = 0; i < 24; i++) {
    const a = (i/24)*2*Math.PI;
    oCtx.beginPath();
    oCtx.arc(cx+(R-1)*Math.cos(a), cy+(R-1)*Math.sin(a), 3.5, 0, 2*Math.PI);
    oCtx.fillStyle='#f5d020'; oCtx.fill();
    oCtx.strokeStyle='#8B6914'; oCtx.lineWidth=0.8; oCtx.stroke();
  }
})();

// State
let wheelAngle = 0, velocity = 0, spinning = false;
let spinCount = 0, pendingResult = null;
let pointerAngle = 0, pointerVel = 0;
let particles = [], confettiActive = false;
const history = [];

// Audio
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playClick(vol) {
  if (!audioCtx || vol < 0.02) return;
  try {
    const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate*0.012), audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*0.004));
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const g = audioCtx.createGain(); g.gain.value = Math.min(vol*0.4,0.35);
    src.connect(g); g.connect(audioCtx.destination); src.start();
  } catch(e) {}
}

function getSectionAtPointer() {
  const sec = (2*Math.PI) / TOTAL;
  const local = ((-Math.PI/2 - wheelAngle) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
  return Math.floor(local / sec);
}

function getAngleForSection(idx) {
  const sec = (2*Math.PI) / TOTAL;
  return -Math.PI/2 - (idx + 0.5) * sec;
}

function startSpin() {
  if (spinning) return;
  ensureAudio();
  spinCount++;
  document.getElementById('spinCount').textContent = `Giro #${spinCount}`;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('result').innerHTML = `<span class="label">RESULTADO</span>...`;
  particles = []; confettiActive = false;

  let targetIdx;
  if (FIXED_SPINS[spinCount] !== undefined) {
    targetIdx = FIXED_SPINS[spinCount] - 1;
  } else {
    targetIdx = Math.floor(Math.random() * TOTAL);
  }
  pendingResult = targetIdx + 1;

  const targetAngle = getAngleForSection(targetIdx);
  let remainder = (targetAngle - wheelAngle) % (2*Math.PI);
  if (remainder <= 0.01) remainder += 2*Math.PI;
  const extra = (5 + Math.floor(Math.random()*6)) * 2*Math.PI;
  velocity = (extra + remainder) * (1 - FRICTION);
  spinning = true;
}

function spawnConfetti() {
  const cols = ['#ffd93d','#ff6b6b','#6bcb77','#4d96ff','#ff9f43','#c77dff','#f5d020','#ffffff'];
  particles = [];
  for (let i = 0; i < 200; i++) {
    particles.push({
      x: Math.random()*cCanvas.width, y: -20-Math.random()*180,
      vx: (Math.random()-0.5)*8, vy: 2+Math.random()*5,
      grav: 0.07+Math.random()*0.09, size: 7+Math.random()*9,
      color: cols[Math.floor(Math.random()*cols.length)],
      rot: Math.random()*Math.PI*2, rv: (Math.random()-0.5)*0.18,
      wide: 0.3+Math.random()*0.7
    });
  }
  confettiActive = true;
}

function addToHistory(num) {
  history.unshift({ num, spin: spinCount });
  const ul = document.getElementById('historyList');
  ul.innerHTML = history.map(e =>
    `<li><span>${e.num}</span><span class="spin-lbl">#${e.spin}</span></li>`
  ).join('');
}

function loop() {
  if (spinning) {
    for (let s = 0; s < 2; s++) {
      const prev = getSectionAtPointer();
      velocity *= FRICTION;
      wheelAngle += velocity * 0.5;
      if (prev !== getSectionAtPointer()) {
        pointerVel += velocity * 0.25;
        playClick(velocity);
      }
    }
    if (velocity < 0.0008) {
      spinning = false;
      document.getElementById('result').innerHTML = `<span class="label">RESULTADO</span>${pendingResult}`;
      document.getElementById('spinBtn').disabled = false;
      addToHistory(pendingResult);
      spawnConfetti();
    }
  }

  pointerAngle += pointerVel;
  pointerVel -= pointerAngle * 0.38;
  pointerVel *= 0.58;

  if (confettiActive) {
    particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=p.grav; p.vx*=0.995; p.rot+=p.rv; });
    particles = particles.filter(p => p.y < cCanvas.height+40);
    if (!particles.length) confettiActive = false;
  }

  // Draw wheel
  wCtx.clearRect(0, 0, SIZE, SIZE);
  wCtx.save();
  wCtx.translate(cx, cy); wCtx.rotate(wheelAngle);
  wCtx.drawImage(offCanvas, -cx, -cy);
  wCtx.restore();

  // Vignette
  const vig = wCtx.createRadialGradient(cx,cy,R-20,cx,cy,R+8);
  vig.addColorStop(0,'transparent'); vig.addColorStop(1,'rgba(0,0,0,0.55)');
  wCtx.beginPath(); wCtx.arc(cx,cy,R+8,0,2*Math.PI);
  wCtx.fillStyle=vig; wCtx.fill();

  // Center cap
  const cap = wCtx.createRadialGradient(cx-5,cy-5,1,cx,cy,26);
  cap.addColorStop(0,'#fffbe6'); cap.addColorStop(0.55,'#d4af37'); cap.addColorStop(1,'#6B4E10');
  wCtx.beginPath(); wCtx.arc(cx,cy,26,0,2*Math.PI);
  wCtx.fillStyle=cap; wCtx.fill();
  wCtx.strokeStyle='#4a3208'; wCtx.lineWidth=2; wCtx.stroke();
  wCtx.beginPath(); wCtx.arc(cx,cy,8,0,2*Math.PI);
  wCtx.fillStyle='#0d0d1a'; wCtx.fill();

  // Pointer mount
  const px=cx, py=cy-R+2;
  wCtx.beginPath(); wCtx.arc(px,py-18,13,0,2*Math.PI);
  wCtx.fillStyle='#1a1a2e'; wCtx.fill();
  wCtx.strokeStyle='#444'; wCtx.lineWidth=1.5; wCtx.stroke();

  // Pointer
  wCtx.save();
  wCtx.translate(px,py-18); wCtx.rotate(pointerAngle);
  wCtx.beginPath();
  wCtx.moveTo(-5,0); wCtx.lineTo(-4,24); wCtx.lineTo(0,37); wCtx.lineTo(4,24); wCtx.lineTo(5,0);
  wCtx.closePath();
  const pg = wCtx.createLinearGradient(-5,0,5,0);
  pg.addColorStop(0,'#ff8a80'); pg.addColorStop(0.4,'#e53935'); pg.addColorStop(1,'#b71c1c');
  wCtx.fillStyle=pg; wCtx.fill(); wCtx.strokeStyle='#7f0000'; wCtx.lineWidth=1; wCtx.stroke();
  wCtx.beginPath(); wCtx.arc(0,0,11,0,2*Math.PI);
  const bg2 = wCtx.createRadialGradient(-3,-3,1,0,0,11);
  bg2.addColorStop(0,'#ff8a80'); bg2.addColorStop(0.5,'#e53935'); bg2.addColorStop(1,'#b71c1c');
  wCtx.fillStyle=bg2; wCtx.fill(); wCtx.strokeStyle='#7f0000'; wCtx.lineWidth=1.5; wCtx.stroke();
  wCtx.beginPath(); wCtx.arc(-2,-3,3.5,0,2*Math.PI);
  wCtx.fillStyle='rgba(255,255,255,0.28)'; wCtx.fill();
  wCtx.restore();

  // Confetti
  cCtx.clearRect(0,0,cCanvas.width,cCanvas.height);
  particles.forEach(p => {
    cCtx.save(); cCtx.translate(p.x,p.y); cCtx.rotate(p.rot);
    cCtx.fillStyle=p.color;
    cCtx.fillRect(-p.size*p.wide/2,-p.size/4,p.size*p.wide,p.size/2);
    cCtx.restore();
  });

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
